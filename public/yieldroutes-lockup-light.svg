  <text x="112" y="42" font-family="'Raleway','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="-0.3" fill="#0d0b16">Yield<tspan fill="#5b21b6">Routes</tspan></text>
  <text x="112" y="62" font-family="'Raleway','Helvetica Neue',Arial,sans-serif" font-size="12.5" font-weight="500" letter-spacing="2.5" fill="#6b7280">STELLAR · SOROBAN</text>
