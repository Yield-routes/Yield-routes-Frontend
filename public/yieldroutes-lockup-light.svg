<svg width="360" height="90" viewBox="0 0 360 90" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>YieldRoutes</title>
  <desc>YieldRoutes logo: the route-convergence mark alongside the wordmark.</desc>
  <defs>
