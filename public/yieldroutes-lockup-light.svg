      <stop offset="0%" stop-color="#1dd9b3"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#f59e0b"/>
